[phases.setup]
nixPkgs = ['php82', 'php82Extensions.gd', 'php82Extensions.zip', 'php82Extensions.exif', 'php82Extensions.bcmath', 'php82Extensions.curl', 'php82Extensions.simplexml', 'php82Extensions.mbstring', 'php82Extensions.openssl', 'php82Extensions.pdo', 'php82Extensions.pdo_mysql', 'php82Extensions.xml', 'php82Extensions.dom', 'php82Extensions.fileinfo', 'php82Extensions.filter', 'php82Extensions.hash', 'php82Extensions.session', 'php82Extensions.tokenizer', 'php82Extensions.ctype', 'composer']

[phases.build]
cmds = ['composer install --no-dev --optimize-autoloader --no-interaction --prefer-dist', 'php artisan config:cache', 'php artisan route:cache', 'php artisan view:cache', 'php artisan passport:keys --force', 'rm -rf public/storage', 'ln -sfn /app/storage/app/public /app/public/storage']
